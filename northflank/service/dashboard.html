
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VAIIIxBR Dashboard</title>
  <style>
    :root{
      --bg:#050505;
      --gold:#d4af37;
      --green:#00c853;
      --red:#ff3b30;
      --muted:#a1a1a1;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(circle at top, rgba(212,175,55,.10), transparent 30%),
        linear-gradient(180deg,#050505 0%,#090909 100%);
      color:#f5e7b3;
      font-family:Arial, Helvetica, sans-serif;
      min-height:100vh;
    }
    .wrap{max-width:1200px; margin:0 auto; padding:24px;}
    .hero{
      border:1px solid rgba(212,175,55,.35);
      background:linear-gradient(180deg, rgba(20,20,20,.96), rgba(10,10,10,.96));
      border-radius:22px; padding:24px; box-shadow:0 0 30px rgba(212,175,55,.10);
    }
    .top{display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; align-items:center;}
    .title{font-size:34px; font-weight:800; letter-spacing:.08em; color:var(--gold); text-shadow:0 0 12px rgba(212,175,55,.25);}
    .subtitle{margin-top:6px; color:#ddd0a0; font-size:14px; letter-spacing:.2em;}
    .status-badge{
      border:1px solid rgba(212,175,55,.35); border-radius:999px; padding:10px 16px;
      color:#f9e8a8; background:rgba(212,175,55,.08); font-weight:700;
    }
    .grid{display:grid; grid-template-columns:1.4fr .9fr; gap:20px; margin-top:20px;}
    .panel{border:1px solid rgba(212,175,55,.22); background:rgba(9,9,9,.95); border-radius:20px; padding:18px;}
    .chart{height:360px; position:relative; overflow:hidden;}
    .chart svg{width:100%; height:100%; display:block;}
    .section-title{color:var(--gold); font-size:13px; font-weight:700; letter-spacing:.18em; margin-bottom:12px;}
    .signal{font-size:54px; font-weight:900; color:var(--gold); text-shadow:0 0 18px rgba(212,175,55,.45); margin:6px 0 8px;}
    .signal.down{color:var(--red); text-shadow:0 0 18px rgba(255,59,48,.35);}
    .signal.neutral{color:#d0d0d0; text-shadow:none;}
    .metrics{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:10px;}
    .metric{border:1px solid rgba(212,175,55,.16); border-radius:16px; padding:14px; background:rgba(255,255,255,.02);}
    .metric .k{color:var(--muted); font-size:12px; letter-spacing:.10em;}
    .metric .v{margin-top:8px; color:#fff3c7; font-size:24px; font-weight:800;}
    .summary{
      margin-top:16px; padding:14px; border-radius:16px; border:1px solid rgba(212,175,55,.16);
      background:rgba(212,175,55,.04); color:#e9ddb7; line-height:1.5; min-height:92px;
    }
    .footer{margin-top:18px; display:flex; justify-content:space-between; gap:16px; flex-wrap:wrap; color:#baa86c; font-size:13px;}
    .dot{display:inline-block; width:10px; height:10px; border-radius:50%; background:var(--green); box-shadow:0 0 10px rgba(0,200,83,.5); margin-right:8px; vertical-align:middle;}
    @media (max-width: 900px){ .grid{grid-template-columns:1fr} .signal{font-size:42px} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="top">
        <div>
          <div class="title">VAIIIxBR</div>
          <div class="subtitle">ITUB4 · DASHBOARD OPERACIONAL</div>
        </div>
        <div class="status-badge"><span class="dot"></span><span id="serviceStatus">ATIVO</span></div>
      </div>

      <div class="grid">
        <div class="panel chart">
          <div class="section-title">PAINEL VISUAL</div>
          <svg viewBox="0 0 800 420" preserveAspectRatio="none">
            <defs>
              <linearGradient id="g1" x1="0" x2="0" y1="0" y2="1">
                <stop offset="0%" stop-color="rgba(212,175,55,0.22)"/>
                <stop offset="100%" stop-color="rgba(212,175,55,0.02)"/>
              </linearGradient>
            </defs>
            <rect x="0" y="0" width="800" height="420" fill="transparent"/>
            <g opacity="0.18" stroke="#d4af37">
              <line x1="0" y1="90" x2="800" y2="90"/>
              <line x1="0" y1="180" x2="800" y2="180"/>
              <line x1="0" y1="270" x2="800" y2="270"/>
              <line x1="0" y1="360" x2="800" y2="360"/>
            </g>
            <path d="M20,300 C80,260 120,240 170,245 C220,250 250,210 290,180 C340,142 390,170 430,146 C490,110 520,135 570,120 C620,104 670,70 720,40" fill="none" stroke="#d4af37" stroke-width="4"/>
            <path d="M20,300 C80,260 120,240 170,245 C220,250 250,210 290,180 C340,142 390,170 430,146 C490,110 520,135 570,120 C620,104 670,70 720,40 L720,420 L20,420 Z" fill="url(#g1)"/>
            <g>
              <line x1="120" y1="240" x2="120" y2="305" stroke="#ff3b30" stroke-width="4"/>
              <rect x="108" y="256" width="24" height="35" fill="#ff3b30"/>
              <line x1="200" y1="198" x2="200" y2="260" stroke="#00c853" stroke-width="4"/>
              <rect x="188" y="212" width="24" height="32" fill="#00c853"/>
              <line x1="280" y1="172" x2="280" y2="235" stroke="#00c853" stroke-width="4"/>
              <rect x="268" y="184" width="24" height="38" fill="#00c853"/>
              <line x1="360" y1="150" x2="360" y2="220" stroke="#ff3b30" stroke-width="4"/>
              <rect x="348" y="165" width="24" height="42" fill="#ff3b30"/>
              <line x1="440" y1="120" x2="440" y2="185" stroke="#00c853" stroke-width="4"/>
              <rect x="428" y="132" width="24" height="38" fill="#00c853"/>
              <line x1="520" y1="108" x2="520" y2="170" stroke="#00c853" stroke-width="4"/>
              <rect x="508" y="118" width="24" height="34" fill="#00c853"/>
              <line x1="600" y1="88" x2="600" y2="148" stroke="#00c853" stroke-width="4"/>
              <rect x="588" y="100" width="24" height="31" fill="#00c853"/>
            </g>
          </svg>
        </div>

        <div class="panel">
          <div class="section-title">SINAL PRINCIPAL</div>
          <div id="action" class="signal neutral">NEUTRAL</div>
          <div class="metrics">
            <div class="metric"><div class="k">STATUS</div><div class="v" id="status">CARREGANDO</div></div>
            <div class="metric"><div class="k">NEWS SCORE</div><div class="v" id="newsScore">0.00</div></div>
            <div class="metric"><div class="k">CONF. HINT</div><div class="v" id="confidenceHint">0.00</div></div>
            <div class="metric"><div class="k">HEADLINES</div><div class="v" id="headlineCount">0</div></div>
          </div>
          <div class="summary" id="summary">Aguardando atualização do motor VAIIIxBR.</div>
        </div>
      </div>

      <div class="footer">
        <div>Ativo fixo: <strong>ITUB4</strong></div>
        <div>Atualização automática a cada 10s</div>
        <div id="lastUpdate">Última atualização: --</div>
      </div>
    </div>
  </div>

  <script>
    function styleAction(action){
      const el = document.getElementById("action");
      el.className = "signal";
      const text = String(action || "NEUTRAL").toUpperCase();
      el.textContent = text;
      if (text.includes("DOWN") || text.includes("SELL")) el.classList.add("down");
      else if (text === "NEUTRAL" || text.includes("HOLD")) el.classList.add("neutral");
    }
    async function refreshDashboard(){
      try{
        const res = await fetch("/status", {cache: "no-store"});
        const data = await res.json();
        const d = data.dashboard_state || {};
        styleAction(d.action || "NEUTRAL");
        document.getElementById("status").textContent = d.status || "UNKNOWN";
        document.getElementById("newsScore").textContent = Number(d.news_score || 0).toFixed(2);
        document.getElementById("confidenceHint").textContent = Number(d.confidence_hint || 0).toFixed(2);
        document.getElementById("headlineCount").textContent = String(d.headline_count || 0);
        document.getElementById("summary").textContent = d.summary || "Sem resumo disponível.";
        document.getElementById("serviceStatus").textContent = data.ok ? "ATIVO" : "INSTÁVEL";
        document.getElementById("lastUpdate").textContent = "Última atualização: " + new Date().toLocaleTimeString("pt-BR");
      }catch(err){
        document.getElementById("serviceStatus").textContent = "ERRO";
        document.getElementById("summary").textContent = "Falha ao consultar /status.";
      }
    }
    refreshDashboard();
    setInterval(refreshDashboard, 10000);
  </script>
</body>
</html>
