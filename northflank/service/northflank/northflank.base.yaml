# Arquivo-base de referência para configurar a VAIIIxBR na Northflank.
# Este arquivo NÃO é garantido como template importável direto.
# Use-o como mapa de configuração no painel da Northflank.
project:
  name: vaiiixbr
  description: VAIIIxBR em paper trading com ITUB4 fixa
services:
  - name: vaiiixbr-web
    type: deployment
    build:
      type: dockerfile
      dockerfile: /Dockerfile
      context: /
    run:
      command: uvicorn main_api:app --host 0.0.0.0 --port $PORT
      port: 8000
    storage:
      mount_path: /app/data
    env_file: northflank/runtime.env.example

  - name: vaiiixbr-worker
    type: deployment
    build:
      type: dockerfile
      dockerfile: /Dockerfile
      context: /
    run:
      command: python main_worker.py
    storage:
      mount_path: /app/data
    env_file: northflank/runtime.env.example
